<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Research Paper Reviewer</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center mb-8">AI Research Paper Reviewer</h1>
        <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
            <form id="uploadForm">
                <div class="mb-4">
                    <label for="pdfFile" class="block text-sm font-medium text-gray-700">Upload PDF</label>
                    <input type="file" id="pdfFile" accept=".pdf" class="mt-1 block w-full">
                </div>
                <div class="mb-4">
                    <label class="inline-flex items-center">
                        <input type="checkbox" id="useMock" class="form-checkbox">
                        <span class="ml-2">Use Mock LLM (for testing)</span>
                    </label>
                </div>
                <div class="mb-4">
                    <label class="inline-flex items-center">
                        <input type="checkbox" id="useCloud" class="form-checkbox">
                        <span class="ml-2">Use Claude Cloud LLM (requires ANTHROPIC_API_KEY)</span>
                    </label>
                </div>
                <button type="submit" class="w-full bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600" id="submitBtn">
                    Review Paper
                </button>
            </form>
            <div id="loading" class="hidden mt-4 text-center">
                <div class="spinner"></div>
                <p>Analyzing paper... This may take a few minutes.</p>
            </div>
        </div>
        <div id="results" class="max-w-4xl mx-auto mt-8 hidden">
            <h2 class="text-2xl font-bold mb-4">Review Results</h2>
            <div id="reviewContent"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
